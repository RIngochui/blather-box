<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlatherBox</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; text-align:center; }
    .home-logo { font-size:3.5rem; font-weight:900; letter-spacing:-0.03em; margin-bottom:0.5rem; }
    .home-logo span { color:var(--accent2); }
    .tagline { color:var(--muted); font-size:1.1rem; margin-bottom:2.5rem; }
    .home-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap:1rem; width:100%; max-width:700px; }
    .home-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:2rem 1.5rem; cursor:pointer; transition:border-color 0.2s, transform 0.15s; text-decoration:none; color:var(--text); }
    .home-card:hover { border-color:var(--accent2); transform:translateY(-3px); }
    .home-card .icon { font-size:2.5rem; margin-bottom:0.75rem; }
    .home-card h3 { margin-bottom:0.25rem; }
    .home-card p { color:var(--muted); font-size:0.9rem; }
  </style>
</head>
<body>
  <div class="home-logo">Blather<span>Box</span></div>
  <p class="tagline">A Blather Round-style party game — bring your own topics!</p>

  <div class="home-grid">
    <a href="/host" class="home-card">
      <div class="icon">📺</div>
      <h3>Host Game</h3>
      <p>Create a room and run the game on the big screen</p>
    </a>
    <a href="/join" class="home-card">
      <div class="icon">📱</div>
      <h3>Join Game</h3>
      <p>Enter a room code to play on your phone</p>
    </a>
    <a href="/submit" class="home-card">
      <div class="icon">✏️</div>
      <h3>Submit Topics</h3>
      <p>Add your own topics for future rounds</p>
    </a>
    <a href="/admin" class="home-card">
      <div class="icon">🛡️</div>
      <h3>Admin</h3>
      <p>Review and approve submitted topics</p>
    </a>
  </div>
</body>
</html>
