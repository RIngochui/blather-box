<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlatherBox — Submit a Topic</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    .submit-logo { font-size: 1.8rem; font-weight: 900; text-align: center; margin-bottom: 0.25rem; }
    .submit-logo span { color: var(--accent2); }
    #success-screen { text-align: center; padding: 3rem 1rem; }
    #success-screen .big-check { font-size: 4rem; margin-bottom: 1rem; }
  </style>
</head>
<body>

  <div id="form-screen">
    <div class="submit-logo mb-2">Blather<span>Box</span></div>
    <h2 class="text-center mb-1">Submit a Topic</h2>

    <form id="submit-form">
      <div class="form-group">
        <label>Your Name (optional)</label>
        <input type="text" id="sub-name" placeholder="Anonymous" maxlength="40" autocorrect="off">
      </div>

      <div class="form-group">
        <label>Topic <span style="color:var(--red);font-weight:700;">*</span></label>
        <input type="text" id="sub-topic" placeholder="e.g. Toaster, Cleopatra, Paris…" maxlength="80"
          required autocorrect="off" autocapitalize="words">
        <span class="field-hint">What should players be guessing?</span>
      </div>

      <div class="form-group">
        <label>Category <span style="color:var(--red);font-weight:700;">*</span></label>
        <select id="sub-category" required>
          <option value="">— Select a category —</option>
          <option>Thing</option>
          <option>Person</option>
          <option>Place</option>
          <option>Food/Drink</option>
          <option>Activity</option>
          <option>Movie/Show</option>
        </select>
      </div>

      <div class="form-group">
        <label>Alternate Names <span style="color:var(--muted);font-weight:400;font-size:0.85rem;">(optional)</span></label>
        <input type="text" id="sub-aliases" placeholder="e.g. FGO, Hitler, The Big Apple"
          maxlength="200" autocorrect="off" autocapitalize="words">
        <span class="field-hint">Comma-separated. Guessers can type any of these to win.</span>
      </div>

      <p id="form-error" class="text-red mt-2 hidden" style="font-size:0.9rem;"></p>

      <button type="submit" class="btn btn-primary btn-lg btn-block mt-3" id="submit-btn">
        Submit Topic
      </button>
    </form>

    <div style="margin-top:2rem;text-align:center;">
      <a href="/" class="text-muted" style="font-size:0.9rem;">← Back to Home</a>
    </div>
  </div>

  <div id="success-screen" class="hidden">
    <div class="big-check">✅</div>
    <h2>Topic Submitted!</h2>
    <p class="text-muted mt-2" style="margin-bottom:1.5rem;">Your topic is pending review and will appear in the game once approved.</p>
    <button class="btn btn-primary" onclick="resetForm()">Submit Another</button>
    <div style="margin-top:1rem;">
      <a href="/" class="text-muted" style="font-size:0.9rem;">← Back to Home</a>
    </div>
  </div>

  <script src="/js/submit.js"></script>
</body>
</html>
